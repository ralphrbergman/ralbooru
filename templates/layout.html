<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% set app_name = settings.NAME %}

  {% if title %}
    {% set document_title = app_name + ": " + title %}
  {% else %}
    {% set document_title = app_name %}
  {% endif %}

  <title>{{ document_title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', path = 'css/style.css') }}">
  {% block style %}
  {% endblock %}
</head>
<body>
  {% block body %}
  {% endblock %}
</body>
</html>
